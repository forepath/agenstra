name: Release

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      packages: write
    outputs:
      new_release_published: ${{ steps.semantic-release.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic-release.outputs.new_release_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Generate token
        id: generate-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.SEMANTIC_RELEASE_APP_ID }}
          private_key: ${{ secrets.SEMANTIC_RELEASE_KEY_PEM }}

      - name: Semantic release
        uses: cycjimmy/semantic-release-action@v5
        id: semantic-release
        with:
          semantic_version: 22.0.5
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            conventional-changelog-conventionalcommits@7.0.2
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Run build
        if: steps.semantic-release.outputs.new_release_published == 'true'
        run: npx nx run-many --target=build --configuration=production --parallel=3 || echo "No projects for build"

      - name: Generate binaries
        if: steps.semantic-release.outputs.new_release_published == 'true'
        run: npx nx run-many --target=scripts-binary --parallel=3 || echo "No projects for scripts binary build"

      - name: Run SBOM generation
        if: steps.semantic-release.outputs.new_release_published == 'true'
        env:
          VERSION: ${{ steps.semantic-release.outputs.new_release_version }}
        run: npx nx run-many --target=sbom --parallel=1 || echo "No projects for sbom generation"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: steps.semantic-release.outputs.new_release_published == 'true'
        with:
          name: build-artifacts
          path: |
            dist/
            node_modules/
          retention-days: 1
          compression-level: 6

  build-api-container-images:
    name: Build API Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish API container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=api-container-image --configuration=release --parallel=3 || echo "No projects for api container image build"

  build-worker-container-images:
    name: Build Worker Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Worker container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=worker-container-image --configuration=release --parallel=3 || echo "No projects for worker container image build"

  build-vnc-container-images:
    name: Build VNC Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish VNC container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=vnc-container-image --configuration=release --parallel=3 || echo "No projects for vnc container image build"

  build-ssh-container-images:
    name: Build SSH Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish SSH container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=ssh-container-image --configuration=release --parallel=3 || echo "No projects for ssh container image build"

  build-agi-container-images:
    name: Build AGI Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish AGI container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=agi-container-image --configuration=release --parallel=3 || echo "No projects for agi container image build"

  build-server-container-images:
    name: Build Server Container Images
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: 'Login to container registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Server container images
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=server-container-image --configuration=release --parallel=3 || echo "No projects for server container image build"

  publish-openapi-clients-js:
    name: Publish OpenAPI JavaScript/TypeScript Clients
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Configure npm for GitHub Packages
        run: |
          echo "@forepath:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> ~/.npmrc

      - name: Install OpenAPI Generator CLI
        run: |
          npm install --ignore-scripts=false @openapitools/openapi-generator-cli
          npx @openapitools/openapi-generator-cli version

      - name: Publish JavaScript/TypeScript clients
        env:
          VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          npx nx run-many --target=openapi-client-js --configuration=release --parallel=3 || echo "No projects for openapi js client publish"

  build-native-applications-linux:
    name: Publish Linux Applications
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Build binaries
        env:
          ELECTRON_FORGE_PLATFORM: linux
          RELEASE_VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          xvfb-run -a npx nx run-many --target=package --configuration=production-linux --parallel=3 || echo "No projects for native applications build"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-artifacts-linux
          path: |
            dist/**/out/make/**/*.zip
            dist/**/out/make/**/*.deb
            dist/**/out/make/**/*.rpm
          retention-days: 1
          compression-level: 6

  build-native-applications-windows:
    name: Publish Windows Applications
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Setup Windows build environment
        uses: ./.github/actions/setup-windows-build-env

      - name: Build binaries
        env:
          ELECTRON_FORGE_PLATFORM: win32
          DEBUG: electron-windows-installer*
          RELEASE_VERSION: ${{ needs.publish.outputs.new_release_version }}
        run: |
          xvfb-run -a npx nx run-many --target=package --configuration=production-windows --parallel=3 || echo "No projects for native applications build"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-artifacts-windows
          path: |
            dist/**/out/make/**/*.zip
            dist/**/out/make/**/*.exe
            dist/**/out/make/**/*.msi
            dist/**/out/make/**/*.msix
          retention-days: 1
          compression-level: 6

  publish-native-applications:
    name: Publish Native Applications
    runs-on: ubuntu-latest
    needs:
      - publish
      - build-native-applications-linux
      - build-native-applications-windows
    if: needs.publish.outputs.new_release_published == 'true'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set nx shas
        uses: nrwl/nx-set-shas@v4

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-artifacts-*
          merge-multiple: true

      - name: Consolidate binaries
        run: |
          mkdir -p release
          mkdir -p artifacts
          find artifacts -type f -name '*.zip' -exec cp {} release/ \;
          find artifacts -type f -name '*.deb' -exec cp {} release/ \;
          find artifacts -type f -name '*.rpm' -exec cp {} release/ \;
          find artifacts -type f -name '*.exe' -exec cp {} release/ \;
          find artifacts -type f -name '*.msi' -exec cp {} release/ \;
          find artifacts -type f -name '*.msix' -exec cp {} release/ \;

      - name: Generate desktop integrity manifests (SHA256SUMS + integrity-manifest.json)
        run: |
          shopt -s nullglob
          files=(release/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No desktop binaries in release/; skipping integrity manifests."
            exit 0
          fi
          npx nx run release-integrity:build
          node tools/release-integrity/dist/src/cli.js --input release
          node tools/release-integrity/dist/src/cli.js verify --input release

      - name: Upload binaries to Cloudflare R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
        run: |
          aws s3 cp release/ s3://${{ secrets.AWS_BUCKET }}/releases/${{ needs.publish.outputs.new_release_version }}/desktop/ --recursive --endpoint-url ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}

  publish-agentctx:
    name: Publish agentctx to Cloudflare R2
    runs-on: ubuntu-latest
    needs:
      - publish
    if: needs.publish.outputs.new_release_published == 'true'
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Upload agentctx to Cloudflare R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
        run: |
          aws s3 cp dist/tools/ai/bin/ s3://${{ secrets.AWS_BUCKET }}/releases/${{ needs.publish.outputs.new_release_version }}/agentctx/ --recursive --endpoint-url ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          aws s3 cp dist/tools/ai/bin/ s3://${{ secrets.AWS_BUCKET }}/agentctx/ --recursive --endpoint-url ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}

  publish-sboms:
    name: Publish SBOMs to DependencyTrack
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.new_release_published == 'true'
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Upload agent-console SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '91161848-3734-4339-a504-bf08853348b1'
          projectname: 'agent-console'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/frontend-agent-console.cdx.json'

      - name: Upload agent-controller SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: 'fab6501b-b798-4e62-91b9-4bb1c5c175c1'
          projectname: 'agent-controller'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/backend-agent-controller.cdx.json'

      - name: Upload agent-manager SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '7d399337-2c6e-408e-8f1f-5f0344af1d08'
          projectname: 'agent-manager'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/backend-agent-manager.cdx.json'

      - name: Upload billing-console SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '6c94f662-28c5-4317-93aa-415bdbccc3ce'
          projectname: 'billing-console'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/frontend-billing-console.cdx.json'

      - name: Upload billing-manager SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '9cc09622-15b6-4dbf-a639-42288ffaa6a4'
          projectname: 'billing-manager'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/backend-billing-manager.cdx.json'

      - name: Upload desktop SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '3dd3b1cd-c07f-4355-baaf-e391de4293d2'
          projectname: 'desktop'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/native-agent-console.cdx.json'

      - name: Upload docs SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '231546ff-a89a-487f-a6b0-6a1361d17a59'
          projectname: 'docs'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/frontend-docs.cdx.json'

      - name: Upload mcp-devkit SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '9cb8e25b-6172-4abc-a3c2-06dd1e778143'
          projectname: 'mcp-devkit'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/mcp-devkit.cdx.json'

      - name: Upload mcp-proxy SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: '729eb40a-7c42-4f6e-9b8a-de47c68b38ca'
          projectname: 'mcp-proxy'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/mcp-proxy.cdx.json'

      - name: Upload portal SBOM
        uses: DependencyTrack/gh-upload-sbom@v3
        continue-on-error: true
        with:
          serverhostname: dependencytrack.forepath.io
          apikey: ${{ secrets.DEPENDENCY_TRACK_API_KEY }}
          parent: 'bb6467b6-ebe9-4f90-91f9-2a785f95441e'
          projectname: 'portal'
          projectversion: ${{ needs.publish.outputs.new_release_version }}
          autocreate: true
          bomfilename: 'dist/sboms/frontend-portal.cdx.json'

      - name: Upload SBOMs to Cloudflare R2 bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          CLOUDFLARE_R2_ENDPOINT: ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
        run: |
          aws s3 cp dist/sboms/ s3://${{ secrets.AWS_BUCKET }}/releases/${{ needs.publish.outputs.new_release_version }}/sboms/ --recursive --endpoint-url ${{ secrets.CLOUDFLARE_R2_ENDPOINT }}
