services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent-controller-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-controller-network
    restart: unless-stopped

  backend-agent-controller:
    image: ghcr.io/forepath/agenstra-controller-api:latest
    container_name: agent-controller-api
    environment:
      # Backend API configuration
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3100}
      WEBSOCKET_PORT: ${WEBSOCKET_PORT:-8081}
      WEBSOCKET_NAMESPACE: ${WEBSOCKET_NAMESPACE:-clients}
      WEBSOCKET_CORS_ORIGIN: ${WEBSOCKET_CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
      # Prompt auto-enrichment (Socket.IO → agent-manager; vector path uses controller env)
      AUTO_ENRICH_ENABLED_GLOBAL: ${AUTO_ENRICH_ENABLED_GLOBAL:-true}
      AUTO_ENRICH_VECTOR_ENABLED: ${AUTO_ENRICH_VECTOR_ENABLED:-true}
      AUTO_ENRICH_MAX_SECTIONS: ${AUTO_ENRICH_MAX_SECTIONS:-6}
      AUTO_ENRICH_MAX_CHARS: ${AUTO_ENRICH_MAX_CHARS:-12000}
      AUTO_ENRICH_VECTOR_TOP_K: ${AUTO_ENRICH_VECTOR_TOP_K:-20}
      # Max pgvector cosine distance (<=>) for knowledge chunks in vector auto-enrichment (0–2; default 1)
      AUTO_ENRICH_VECTOR_MAX_COSINE_DISTANCE: ${AUTO_ENRICH_VECTOR_MAX_COSINE_DISTANCE:-1}
      # Full knowledge-embedding reindex interval (ms); set <= 0 to disable scheduler
      KNOWLEDGE_EMBEDDINGS_REINDEX_INTERVAL_MS: ${KNOWLEDGE_EMBEDDINGS_REINDEX_INTERVAL_MS:-3600000}
      # Database configuration
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-postgres}
      # Environment variables for the provisioning providers
      HETZNER_API_TOKEN: ${HETZNER_API_TOKEN:-}
      DIGITALOCEAN_API_TOKEN: ${DIGITALOCEAN_API_TOKEN:-}
      # Authentication method configuration
      AUTHENTICATION_METHOD: ${AUTHENTICATION_METHOD:-api-key}
      # Environment variables for disabling signup
      DISABLE_SIGNUP: ${DISABLE_SIGNUP:-false}
      # Static API key authentication configuration
      STATIC_API_KEY: ${STATIC_API_KEY:-}
      # Environment variables for encryption
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      # CORS configuration (comma-separated list of allowed origins)
      # In production: CORS is disabled by default. Set CORS_ORIGIN to allow specific origins.
      # In development: CORS allows all origins by default.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      # Rate limiting configuration
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:-100}
      # Keycloak configuration
      KEYCLOAK_SERVER_URL: ${KEYCLOAK_SERVER_URL:-}
      KEYCLOAK_AUTH_SERVER_URL: ${KEYCLOAK_AUTH_SERVER_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_TOKEN_VALIDATION: ${KEYCLOAK_TOKEN_VALIDATION:-online}
      # Environment variables for users authentication (when AUTHENTICATION_METHOD=users)
      JWT_SECRET: ${JWT_SECRET:-}
      # SMTP / MailHog configuration (for email confirmation and password reset)
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@localhost}
      # Client workspace endpoint configuration
      CLIENT_ENDPOINT_ALLOWED_HOSTS: ${CLIENT_ENDPOINT_ALLOWED_HOSTS:-}
      CLIENT_ENDPOINT_ALLOW_INSECURE_HTTP: ${CLIENT_ENDPOINT_ALLOW_INSECURE_HTTP:-true}
      CLIENT_ENDPOINT_TLS_REJECT_UNAUTHORIZED: ${CLIENT_ENDPOINT_TLS_REJECT_UNAUTHORIZED:-false}
      CLIENT_ENDPOINT_ALLOW_INTERNAL_HOST: ${CLIENT_ENDPOINT_ALLOW_INTERNAL_HOST:-true}
    ports:
      - '${PORT:-3100}:${PORT:-3100}'
      - '${WEBSOCKET_PORT:-8081}:${WEBSOCKET_PORT:-8081}'
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - agent-controller-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: agent-controller-mailhog
    ports:
      - '${SMTP_PORT:-1025}:${SMTP_PORT:-1025}'
      - '${MAILHOG_PORT:-8025}:${MAILHOG_PORT:-8025}'
    networks:
      - agent-controller-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  agent-controller-network:
    driver: bridge
